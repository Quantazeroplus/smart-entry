name: Obfuscate and Deploy to Pages

on:
  push:
    branches: ["main"] 
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate env.js inside existing www folder
        run: |
          # Create env.js directly where index.html is
          echo "const ENV = {" > www/env.js
          echo "  SCRIPT_URL: '${{ secrets.SCRIPT_URL }}'," >> www/env.js
          echo "  QR_LAT: ${{ secrets.QR_LAT }}," >> www/env.js
          echo "  QR_LON: ${{ secrets.QR_LON }}," >> www/env.js
          echo "  MAX_DIST: ${{ secrets.MAX_DIST }}," >> www/env.js
          echo "  GUARD_PASS: '${{ secrets.GUARD_PASS }}'" >> www/env.js
          echo "};" >> www/env.js

      - name: Install JavaScript Obfuscator
        run: npm install -g javascript-obfuscator

      - name: Scramble JavaScript in www Folder
        run: |
          # Target the scripts inside the www subfolder
          javascript-obfuscator www/script.js --output www/script.js \
            --compact true \
            --control-flow-flattening true \
            --dead-code-injection true \
            --string-array true \
            --string-array-encoding 'base64' \
            --disable-console-output true

          if [ -f "www/qr_script.js" ]; then
            javascript-obfuscator www/qr_script.js --output www/qr_script.js \
              --compact true \
              --control-flow-flattening true \
              --dead-code-injection true \
              --string-array true \
              --string-array-encoding 'base64' \
              --disable-console-output true
          fi

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # This tells GitHub to host the contents of the www folder
          path: './www'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
name: Obfuscate and Deploy to Pages

on:
  push:
    branches: ["main"] 
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create WWW Build Folder & Generate env.js
        run: |
          # 1. Create a clean www folder
          mkdir -p www
          
          # 2. Copy all your files into www
          cp -r index.html style.css script.js manifest.json sw.js images www/
          if [ -f "qr_script.js" ]; then cp qr_script.js www/; fi
          if [ -f "qr_guard.html" ]; then cp qr_guard.html www/; fi
          
          # 3. Generate env.js directly inside the www folder using GitHub Secrets
          echo "const ENV = {" > www/env.js
          echo "  SCRIPT_URL: '${{ secrets.SCRIPT_URL }}'," >> www/env.js
          echo "  QR_LAT: ${{ secrets.QR_LAT }}," >> www/env.js
          echo "  QR_LON: ${{ secrets.QR_LON }}," >> www/env.js
          echo "  MAX_DIST: ${{ secrets.MAX_DIST }}," >> www/env.js
          echo "  GUARD_PASS: '${{ secrets.GUARD_PASS }}'" >> www/env.js
          echo "};" >> www/env.js

      - name: Install JavaScript Obfuscator
        run: npm install -g javascript-obfuscator

      - name: Scramble JavaScript in WWW Folder
        run: |
          # Obfuscate the scripts INSIDE the www folder, keeping original source safe
          javascript-obfuscator www/script.js --output www/script.js \
            --compact true \
            --control-flow-flattening true \
            --dead-code-injection true \
            --string-array true \
            --string-array-encoding 'base64' \
            --disable-console-output true

          if [ -f "www/qr_script.js" ]; then
            javascript-obfuscator www/qr_script.js --output www/qr_script.js \
              --compact true \
              --control-flow-flattening true \
              --dead-code-injection true \
              --string-array true \
              --string-array-encoding 'base64' \
              --disable-console-output true
          fi

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
         path: './www'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guard Security Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="qr_style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />

    <script>

        if (
            localStorage.getItem("theme") === "dark" ||
            (!("theme" in localStorage) &&
                window.matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
            document.documentElement.classList.add("dark");
        } else {
            document.documentElement.classList.remove("dark");
        }

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    fontFamily: { sans: ["Poppins", "sans-serif"] },
                    animation: {
                        "slide-up": "slideUp 0.5s ease-out forwards",
                        "shake-error": "shake 0.3s ease-in-out",
                    },
                    keyframes: {
                        slideUp: {
                            "0%": { transform: "translateY(20px)", opacity: "0" },
                            "100%": { transform: "translateY(0)", opacity: "1" },
                        },
                        shake: {
                            "0%, 100%": { transform: "translateX(0)" },
                            "25%": { transform: "translateX(-6px)" },
                            "75%": { transform: "translateX(6px)" },
                        },
                    },
                },
            },
        };
    </script>

</head>

<body
    class="min-h-screen flex items-center justify-center p-4 overflow-hidden bg-slate-100 text-slate-900 dark:bg-[#0f172a] dark:text-white bg-[radial-gradient(circle_at_50%_0%,_#f8fafc_0%,_#e2e8f0_70%)] dark:bg-[radial-gradient(circle_at_50%_0%,_#1e293b_0%,_#0f172a_70%)] transition-colors duration-500">
    <div id="guardAuthBox"
        class="w-full max-w-md md:max-w-lg glass-card rounded-[2.5rem] p-8 md:p-12 shadow-[0_20px_50px_rgba(0,0,0,0.1)] dark:shadow-[0_20px_50px_rgba(0,0,0,0.5)] text-center animate-slide-up relative overflow-hidden flex flex-col">
        <button onclick="toggleGuardTheme()"
            class="absolute top-5 right-5 md:top-6 md:right-6 w-10 h-10 rounded-full bg-slate-200/50 dark:bg-slate-800/50 border border-slate-300/50 dark:border-slate-600/50 flex items-center justify-center text-slate-600 dark:text-slate-300 hover:bg-slate-300/50 dark:hover:bg-slate-700/50 transition-colors z-[100]">
            <i class="fas fa-moon dark:hidden text-lg"></i>
            <i class="fas fa-sun hidden dark:block text-yellow-400 text-lg"></i>
        </button>

        <div class="absolute -top-20 -right-20 w-40 h-40 bg-blue-500/20 blur-[3rem] rounded-full pointer-events-none">
        </div>
        <div
            class="w-20 h-20 md:w-24 md:h-24 mx-auto bg-gradient-to-br from-indigo-100 to-blue-100 dark:from-indigo-900/50 dark:to-blue-900/50 rounded-full flex items-center justify-center mb-5 text-indigo-600 dark:text-blue-400 shadow-[inset_0_0_20px_rgba(99,102,241,0.1)] dark:shadow-[inset_0_0_20px_rgba(99,102,241,0.3)] border border-indigo-200 dark:border-blue-500/30 relative z-10 transition-all duration-300">
            <i class="fas fa-fingerprint text-4xl md:text-5xl"></i>
        </div>

        <h2 class="text-2xl md:text-3xl font-black mb-1 tracking-tight text-slate-800 dark:text-white relative z-10">
            Security Access
        </h2>
        <p id="targetRollText"
            class="text-xs md:text-sm text-indigo-600/80 dark:text-blue-300/80 mb-8 font-bold uppercase tracking-widest relative z-10">
            SCANNING ID...
        </p>

        <div class="relative mb-8 z-10">
            <input type="password" id="guardPassword" class="input-field text-center text-xl md:text-2xl font-black"
                placeholder="PASSWORD" />
        </div>

        <button id="guardUnlockBtn" onclick="verifyGuardPassword()"
            class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-4 md:py-5 rounded-2xl font-black text-[15px] md:text-lg hover:scale-[1.02] transition-all shadow-[0_10px_20px_-5px_rgba(79,70,229,0.5)] active:scale-95 relative z-10 border border-white/10">
            <i class="fas fa-unlock mr-2"></i> UNLOCK PROFILE
        </button>
    </div>

    <div id="guardProfileBox"
        class="w-full max-w-md md:max-w-2xl glass-card rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.15)] dark:shadow-[0_20px_50px_rgba(0,0,0,0.5)] hidden flex-col relative animate-slide-up overflow-hidden max-h-[92vh] border-t border-slate-200 dark:border-white/20">
        <div class="w-full h-full overflow-y-auto custom-scrollbar relative pb-6 md:pb-8">
            <div id="gHeaderBanner"
                class="h-[120px] md:h-[150px] bg-gradient-to-r from-slate-200 to-slate-300 dark:from-slate-700 dark:to-slate-800 relative flex justify-between items-start p-5 md:p-8 transition-colors duration-500">
                <div id="gStatusBadge"
                    class="px-4 py-2 rounded-full backdrop-blur-md text-[10px] md:text-xs font-black tracking-widest uppercase border flex items-center gap-2 bg-white/50 dark:bg-slate-900/50 border-slate-300 dark:border-slate-500/50 text-slate-600 dark:text-slate-300 shadow-lg">
                    <span id="gStatusDot" class="w-2.5 h-2.5 rounded-full bg-slate-400"></span>
                    <span id="gStatusText">UNKNOWN</span>
                </div>

                <div class="flex items-center gap-2 md:gap-3">
                    <button onclick="toggleGuardTheme()"
                        class="w-10 h-10 md:w-12 md:h-12 rounded-full bg-black/10 dark:bg-black/30 flex items-center justify-center text-slate-700 dark:text-white hover:bg-black/20 dark:hover:bg-black/50 transition-colors backdrop-blur-md border border-black/5 dark:border-white/10">
                        <i class="fas fa-moon dark:hidden md:text-xl"></i>
                        <i class="fas fa-sun hidden dark:block text-yellow-400 md:text-xl"></i>
                    </button>
                    <button onclick="location.reload()"
                        class="w-10 h-10 md:w-12 md:h-12 rounded-full bg-black/10 dark:bg-black/30 flex items-center justify-center text-slate-700 dark:text-white hover:bg-black/20 dark:hover:bg-black/50 transition-colors backdrop-blur-md border border-black/5 dark:border-white/10">
                        <i class="fas fa-times md:text-xl"></i>
                    </button>
                </div>
            </div>

            <div class="px-6 md:px-10 relative flex flex-col items-center mt-[-3.5rem] md:mt-[-4.5rem]">
                <div id="gAvatarRing"
                    class="w-[110px] h-[110px] md:w-[140px] md:h-[140px] rounded-full border-[4px] border-white dark:border-[#1e293b] shadow-xl dark:shadow-[0_0_30px_rgba(0,0,0,0.5)] bg-slate-200 dark:bg-slate-800 flex items-center justify-center z-10 overflow-hidden relative transition-colors duration-500">
                    <img id="gProfileImg" src="" class="hidden w-full h-full object-cover" />
                    <span id="gInitials"
                        class="text-4xl md:text-5xl font-black text-slate-500 dark:text-slate-400">ST</span>
                </div>

                <h2 id="gName"
                    class="text-[22px] md:text-3xl font-black mt-3 md:mt-4 text-slate-800 dark:text-white text-center leading-tight">
                    Student Name
                </h2>
                <div class="flex items-center gap-2 mt-1 md:mt-2 mb-5 md:mb-8">
                    <span id="gRoleBadge"
                        class="px-2 py-0.5 bg-blue-100 dark:bg-blue-500/20 text-blue-600 dark:text-blue-400 text-[10px] md:text-xs font-black uppercase rounded border border-blue-200 dark:border-blue-500/30">STUDENT</span>
                    <p id="gRoll"
                        class="text-[13px] md:text-base font-black text-slate-500 dark:text-slate-300 tracking-widest uppercase">
                        ROLL NO
                    </p>
                </div>

                <div class="w-full grid grid-cols-2 gap-3 md:gap-5 text-left mb-4 md:mb-6">
                    <div class="info-box p-3.5 md:p-5 rounded-2xl md:rounded-3xl">
                        <span
                            class="text-[9px] md:text-[11px] text-slate-500 dark:text-slate-400 font-bold uppercase tracking-widest block mb-1"><i
                                class="fas fa-graduation-cap mr-1 text-indigo-500 dark:text-indigo-400"></i>
                            Branch</span>
                        <p id="gBranch"
                            class="text-sm md:text-lg font-black text-slate-800 dark:text-white leading-tight truncate">
                            CSE
                        </p>
                    </div>

                    <div class="info-box p-3.5 md:p-5 rounded-2xl md:rounded-3xl">
                        <span
                            class="text-[9px] md:text-[11px] text-slate-500 dark:text-slate-400 font-bold uppercase tracking-widest block mb-1"><i
                                class="fas fa-venus-mars mr-1 text-pink-500 dark:text-pink-400"></i>
                            Gender</span>
                        <p id="gGender"
                            class="text-sm md:text-lg font-black text-slate-800 dark:text-white leading-tight truncate">
                            Boy
                        </p>
                    </div>

                    <div class="info-box p-3.5 md:p-5 rounded-2xl md:rounded-3xl">
                        <span
                            class="text-[9px] md:text-[11px] text-slate-500 dark:text-slate-400 font-bold uppercase tracking-widest block mb-1"><i
                                class="fas fa-door-open mr-1 text-amber-500 dark:text-amber-400"></i>
                            Room No</span>
                        <p id="gRoom"
                            class="text-sm md:text-lg font-black text-slate-800 dark:text-white leading-tight truncate">
                            101
                        </p>
                    </div>

                    <div class="info-box p-3.5 md:p-5 rounded-2xl md:rounded-3xl">
                        <span
                            class="text-[9px] md:text-[11px] text-slate-500 dark:text-slate-400 font-bold uppercase tracking-widest block mb-1"><i
                                class="fas fa-car mr-1 text-cyan-500 dark:text-cyan-400"></i>
                            Vehicle</span>
                        <p id="gVehicle"
                            class="text-sm md:text-lg font-black text-slate-800 dark:text-white leading-tight truncate">
                            N/A
                        </p>
                    </div>

                    <div class="info-box p-3.5 md:p-5 rounded-2xl md:rounded-3xl col-span-2">
                        <span
                            class="text-[9px] md:text-[11px] text-slate-500 dark:text-slate-400 font-bold uppercase tracking-widest block mb-1"><i
                                class="fas fa-map-marker-alt mr-1 text-rose-500 dark:text-rose-400"></i>
                            Address / Location</span>
                        <p id="gAddress"
                            class="text-[13px] md:text-lg font-bold text-slate-700 dark:text-slate-200 leading-snug">
                            Home
                        </p>
                    </div>

                    <div
                        class="info-box p-3.5 md:p-5 rounded-2xl md:rounded-3xl col-span-2 border-l-4 border-l-blue-500">
                        <span
                            class="text-[9px] md:text-[11px] text-slate-500 dark:text-slate-400 font-bold uppercase tracking-widest block mb-1"><i
                                class="fas fa-bullseye mr-1 text-blue-500 dark:text-blue-400"></i>
                            Purpose of Visit</span>
                        <p id="gPurpose"
                            class="text-[14px] md:text-xl font-black text-slate-800 dark:text-white leading-snug">
                            Going to Market
                        </p>
                    </div>

                    <div
                        class="info-box p-4 md:p-6 rounded-2xl md:rounded-3xl col-span-2 flex justify-between items-center bg-slate-100/80 dark:bg-slate-800/80">
                        <div>
                            <span
                                class="text-[9px] md:text-[11px] text-slate-500 dark:text-slate-400 font-bold uppercase tracking-widest block mb-1">Mobile
                                Number</span>
                            <p id="gMobile"
                                class="text-lg md:text-2xl font-black text-slate-800 dark:text-white tracking-wide">
                                9876543210
                            </p>
                        </div>
                        <a id="gCall" href="#"
                            class="w-11 h-11 md:w-14 md:h-14 rounded-full bg-emerald-100 dark:bg-emerald-500/20 text-emerald-600 dark:text-emerald-400 flex items-center justify-center hover:bg-emerald-500 hover:text-white transition-all shadow-[0_0_15px_rgba(16,185,129,0.2)] dark:shadow-[0_0_15px_rgba(16,185,129,0.3)] border border-emerald-300 dark:border-emerald-500/50">
                            <i class="fas fa-phone-alt md:text-xl"></i>
                        </a>
                    </div>
                </div>

                <div
                    class="w-full info-box rounded-2xl md:rounded-3xl p-5 md:p-8 border-t-4 border-t-slate-400 dark:border-t-slate-600 relative overflow-hidden">
                    <div class="absolute -right-4 -bottom-4 opacity-5 dark:opacity-10">
                        <i class="fas fa-clock text-6xl md:text-8xl text-slate-900 dark:text-white"></i>
                    </div>

                    <div
                        class="flex justify-between items-end mb-4 border-b border-slate-200 dark:border-white/10 pb-4">
                        <div>
                            <span
                                class="text-[9px] md:text-xs text-slate-500 dark:text-slate-400 font-bold uppercase tracking-widest block mb-1"><i
                                    class="fas fa-sign-in-alt text-emerald-500 dark:text-emerald-400 mr-1"></i>
                                IN TIME</span>
                            <p id="gInTime"
                                class="text-xl md:text-3xl font-mono font-black text-slate-800 dark:text-white drop-shadow-md">
                                --:--
                            </p>
                        </div>
                        <div class="text-right">
                            <span
                                class="text-[9px] md:text-xs text-slate-500 dark:text-slate-400 font-bold uppercase tracking-widest block mb-1"><i
                                    class="fas fa-sign-out-alt text-rose-500 dark:text-rose-400 mr-1"></i>
                                OUT TIME</span>
                            <p id="gOutTime"
                                class="text-xl md:text-3xl font-mono font-black text-slate-800 dark:text-white drop-shadow-md">
                                --:--
                            </p>
                        </div>
                    </div>

                    <div class="text-center relative z-10">
                        <span
                            class="text-[10px] md:text-xs text-slate-500 dark:text-slate-400 font-bold uppercase tracking-widest">TRIP
                            DATE:
                            <span id="gDate"
                                class="text-slate-800 dark:text-white ml-1 bg-slate-200 dark:bg-white/10 px-2 py-0.5 rounded">--/--/----</span></span>
                    </div>

                    <div id="guardApproveWrapper" class="hidden w-full mt-5 relative z-10">
                        <button id="guardApproveBtn" onclick="approveGuestRecord()"
                            class="w-full bg-gradient-to-r from-amber-500 to-orange-500 text-white py-4 rounded-xl font-black text-sm hover:scale-[1.02] transition-all shadow-[0_8px_20px_-6px_rgba(245,158,11,0.5)] active:scale-95 border border-amber-300/50 flex items-center justify-center gap-2">
                            <i class="fas fa-check-double"></i> APPROVE GUEST ACTION
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="errorToast"
        class="fixed top-10 left-1/2 transform -translate-x-1/2 z-[400] flex items-center gap-3 bg-rose-100 dark:bg-rose-900/90 backdrop-blur-xl px-6 py-3.5 rounded-full border border-rose-300 dark:border-rose-500/50 transition-all duration-300 -translate-y-32 opacity-0 pointer-events-none shadow-[0_10px_30px_rgba(244,63,94,0.2)] dark:shadow-[0_10px_30px_rgba(244,63,94,0.4)]">
        <i class="fas fa-exclamation-triangle text-rose-600 dark:text-rose-400 text-lg"></i>
        <span id="toastMsg" class="text-sm font-black text-rose-800 dark:text-white tracking-wide">Error</span>
    </div>
    <script src="qr_script.js"></script>
</body>

</html>
